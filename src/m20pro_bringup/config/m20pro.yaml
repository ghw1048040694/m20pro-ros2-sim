m20pro_tcp_bridge:
  ros__parameters:
    robot_ip: "127.0.0.1"
    tcp_port: 30001
    poll_rate_hz: 5.0
    cmd_vel_rate_hz: 20.0
    cmd_vel_timeout_s: 0.5
    send_idle_zero_commands: false
    max_linear_x: 0.8 #原0.8
    max_linear_y: 0.5 #原0.5
    max_angular_z: 1.1
    linear_x_sign: 1.0
    linear_y_sign: 1.0
    angular_z_sign: 1.0
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_link"
    vendor_position_scale: 0.001
    vendor_position_offset_x: 0.0
    vendor_position_offset_y: 0.0
    vendor_position_offset_z: 0.0
    max_abs_map_position_m: 10000.0
    publish_tf: true
    # Used by the sim_bridge executable, which is intentionally named
    # m20pro_tcp_bridge in sim launch so the web/task topic names stay stable.
    initial_x: -5.0 #原0.0
    initial_y: 0.0
    initial_yaw: 0.0
    update_rate_hz: 50.0
    tf_future_offset_s: 0.0
    enable_native_goal_bridge: false
    enable_axis_command: false
    enable_gait_command: true
    gait_command_topic: "/m20pro/gait_command"
    gait_flat_param: 1
    gait_assist_param: 12
    gait_stair_param: 14
    enable_usage_mode_command: false
    usage_mode_command_topic: "/m20pro/usage_mode_command"
    enable_initialpose_relocalization: false
    enable_initialpose_3d_relocalization: false
    initialpose_topic: "/initialpose"
    initialpose_3d_topic: "/m20pro/initialpose_3d"
    relocalization_response_timeout_s: 2.0
    send_heartbeat: false

m20pro_grid_planner:
  ros__parameters:
    map_topic: "/map"
    pose_topic: "/m20pro_tcp_bridge/map_pose"
    goal_topic: "/planner_goal"
    path_topic: "/planned_path"
    occupied_threshold: 65
    inflate_radius_m: 0.30 #原0.25
    allow_unknown: false
    path_downsample: 3
    snap_to_nearest_free: true
    snap_search_radius_m: 0.8

m20pro_path_follower:
  ros__parameters:
    pose_topic: "/m20pro_tcp_bridge/map_pose"
    path_topic: "/planned_path"
    cmd_vel_topic: "/cmd_vel"
    obstacle_topic: "/m20pro_tcp_bridge/obstacle_active"
    scan_topic: "/scan"
    lookahead_m: 0.75 #原0.8
    goal_tolerance_m: 0.35 #原0.25
    yaw_tolerance_rad: 0.35 #原0.25
    linear_speed: 1.00 #原0.25
    angular_gain: 1.1
    max_angular_z: 0.9
    stop_on_obstacle: true
    dynamic_obstacle_topic: "/dynamic_obstacles"
    enable_local_avoidance: true
    enable_scan_avoidance: true
    obstacle_influence_radius: 1.3 #原1.0
    obstacle_stop_radius: 0.55 #原0.35
    obstacle_front_angle_rad: 1.2
    avoidance_gain: 0.9
    slowdown_gain: 0.7
    scan_obstacle_max_age: 0.5
    scan_sample_step: 2

m20pro_dynamic_obstacle_simulator:
  ros__parameters:
    frame_id: "map"
    publish_rate_hz: 10.0
    marker_publish_rate_hz: 5.0
    marker_lifetime_s: 0.35
    marker_topic: "/dynamic_obstacle_markers"
    pose_topic: "/dynamic_obstacles"
    alert_topic: "/dynamic_obstacle_active"
    alert_distance: 0.8
    robot_pose_topic: "/m20pro_tcp_bridge/map_pose"
    obstacle_specs:
      - "-0.5,0.2,1.0,0.2,0.20,8.0,0.0"
      - "0.5,-0.6,0.5,1.0,0.18,6.0,0.35"
      - "4.5,0.5,2.5,0.5,0.15,16.0,0.0"
      - "9.0,1.0,5.5,1.0,0.15,16.0,0.0"
      - "12.0,1.0,12.0,1.0,0.15,16.0,0.0"

m20pro_dual_lidar_simulator:
  ros__parameters:
    robot_pose_topic: "/m20pro_tcp_bridge/map_pose"
    dynamic_obstacle_topic: "/dynamic_obstacles"
    current_floor_topic: "/m20pro/current_floor"
    default_floor: "F20"

    # The simulator uses the recorded PCD map for local perception.
    # Keep this PCD and the active PGM/YAML from the same map package when
    # running metric comparisons.
    pcd_map_path: "package://m20pro_bringup/maps/Original_map/full_cloud.pcd"
    pcd_voxel_size: 0.08
    pcd_index_cell_size: 1.0
    floor_z_ranges:
      - "F19:-1.0:1.5:0.0"
      - "F20:-1.0:1.5:0.0"
      - "F21:-1.0:1.5:0.0"
    default_z_min: -1.0
    default_z_max: 1.5
    default_z_offset: 0.0
    use_occupancy_filter: true
    map_topic: "/map"
    occupancy_filter_threshold: 65
    occupancy_filter_keep_unknown: false
    occupancy_filter_padding_m: 0.0

    front_lidar_topic: "/LIDAR/FRONT/POINTS"
    rear_lidar_topic: "/LIDAR/REAR/POINTS"
    cloud_nav_topic: "/cloud_nav"
    grid_map_3d_topic: "/grid_map_3d"
    publish_debug_lidars: false
    publish_grid_map_3d: true

    min_range: 0.2
    max_range: 10.0
    local_z_min: -0.35
    local_z_max: 1.20
    max_points_per_cloud: 6000
    publish_rate_hz: 10.0
    frame_id: "base_link"

    enable_range_noise: true
    range_noise_sigma_base: 0.01
    range_noise_sigma_per_meter: 0.004
    range_bias_factor: 0.0
    enable_dropout: true
    dropout_distance_scale: 30.0

    dynamic_obstacle_radius: 0.2
    dynamic_obstacle_point_count: 48

m20pro_pointcloud_fusion:
  ros__parameters:
    input_cloud_topic: "/cloud_nav"
    front_lidar_topic: "/LIDAR/FRONT/POINTS"
    rear_lidar_topic: "/LIDAR/REAR/POINTS"
    output_scan_topic: "/scan"
    frame_id: "base_link"
    min_angle: -3.14159
    max_angle: 3.14159
    angle_increment: 0.0174533
    min_range: 0.2
    max_range: 10.0
    height_min: -0.25
    height_max: 0.60
    robot_radius: 0.28
    publish_rate_hz: 10.0
    transform_cloud: true
    use_latest_tf: true
    transform_timeout_s: 0.05
    max_source_age_s: 0.25
